name: Build Ad Hoc IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "DESIGN*"

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  build:
    name: Archive & export IPA
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          openssl version

      - name: Build signing keychain from PEM secrets
        env:
          SIGNING_CERT_PEM: ${{ secrets.SIGNING_CERT_PEM }}
          SIGNING_KEY_PEM: ${{ secrets.SIGNING_KEY_PEM }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_CERT_PEM:-}" ] || [ -z "${SIGNING_KEY_PEM:-}" ]; then
            echo "::error::Missing SIGNING_CERT_PEM or SIGNING_KEY_PEM"
            exit 1
          fi
          if [ -z "${BUILD_PROVISION_PROFILE_BASE64:-}" ]; then
            echo "::error::Missing BUILD_PROVISION_PROFILE_BASE64"
            exit 1
          fi

          CERT_PEM="$RUNNER_TEMP/cert.pem"
          KEY_PEM="$RUNNER_TEMP/key.pem"
          P12_PATH="$RUNNER_TEMP/dist.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s\n' "$SIGNING_CERT_PEM" > "$CERT_PEM"
          printf '%s\n' "$SIGNING_KEY_PEM" > "$KEY_PEM"
          # normalize PEM newlines if secret was stored with escaped content
          if ! grep -q "BEGIN CERTIFICATE" "$CERT_PEM"; then
            echo "::error::SIGNING_CERT_PEM does not look like a PEM certificate"
            exit 1
          fi
          if ! grep -q "BEGIN" "$KEY_PEM"; then
            echo "::error::SIGNING_KEY_PEM does not look like a PEM private key"
            exit 1
          fi

          # Create PKCS12 with algorithms macOS security accepts
          openssl pkcs12 -export \
            -inkey "$KEY_PEM" \
            -in "$CERT_PEM" \
            -out "$P12_PATH" \
            -passout "pass:${P12_PASSWORD}" \
            -name "iPhone Distribution" \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg sha1

          echo "P12 size=$(wc -c < "$P12_PATH")"
          openssl pkcs12 -in "$P12_PATH" -passin "pass:${P12_PASSWORD}" -noout
          echo "P12 self-check OK"

          # Decode provisioning profile (macOS base64 is picky; use Python)
          export PP_PATH
          python3 -c 'import base64,os,pathlib; raw=os.environ["BUILD_PROVISION_PROFILE_BASE64"].strip().replace("\n","").replace(" ",""); data=base64.b64decode(raw); p=pathlib.Path(os.environ["PP_PATH"]); p.write_bytes(data); print("Profile decoded bytes=",len(data)); assert len(data)>=1000, "profile too small"'
          echo "Profile size=$(wc -c < "$PP_PATH")"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          echo "Installed profile UUID=${PROFILE_UUID}"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "iPhone Distribution"
          echo "Codesigning identity ready"

      - name: Resolve schemes
        run: xcodebuild -project PersonalToolbox.xcodeproj -list

      - name: Configure Share Extension (optional)
        env:
          SHARE_BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.SHARE_BUILD_PROVISION_PROFILE_BASE64 }}
          SHARE_PROVISION_PROFILE_SPECIFIER: ${{ secrets.SHARE_PROVISION_PROFILE_SPECIFIER }}
        run: bash scripts/ci-configure-share-extension.sh

      - name: Archive
        run: |
          set -euo pipefail
          set -o pipefail
          set +e
          xcodebuild \
            -project PersonalToolbox.xcodeproj \
            -scheme PersonalToolbox \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/PersonalToolbox.xcarchive" \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=CTSQLK944L \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER=app.parsnip6345.lake8262 \
            PROVISIONING_PROFILE_SPECIFIER="00008150-001A088E148B401C6F01CD" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-archive.log"
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$STATUS" -ne 0 ]; then
            {
              echo "### ❌ Archive failed"
              echo
              echo "#### Grep errors"
              echo '```'
              grep -E 'error:|fatal error' "$RUNNER_TEMP/xcodebuild-archive.log" | tail -n 100 || echo "(no grep hits)"
              echo '```'
              echo
              echo "#### Tail (200 lines)"
              echo '```'
              tail -n 200 "$RUNNER_TEMP/xcodebuild-archive.log" || true
              echo '```'
            } | tee -a "$GITHUB_STEP_SUMMARY"
            # Emit public annotations (readable via REST without log download).
            while IFS= read -r line; do
              if [[ "$line" =~ ([^[:space:]]+\.swift):([0-9]+):([0-9]+):\ error:\ (.*) ]]; then
                echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]},col=${BASH_REMATCH[3]}::${BASH_REMATCH[4]}"
              else
                echo "::error::${line}"
              fi
            done < <(grep -E 'error:|fatal error' "$RUNNER_TEMP/xcodebuild-archive.log" | tail -n 80 || true)
            echo "::group::Swift / xcodebuild errors"
            grep -E 'error:|warning:.*error|❌|fatal error' "$RUNNER_TEMP/xcodebuild-archive.log" | tail -n 80 || true
            echo "::endgroup::"
            exit "$STATUS"
          fi

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/PersonalToolbox.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            | tee "$RUNNER_TEMP/xcodebuild-export.log"
          ls -la "$RUNNER_TEMP/export"
          test -f "$RUNNER_TEMP/export/PersonalToolbox.ipa"
          cp "$RUNNER_TEMP/export/PersonalToolbox.ipa" "$GITHUB_WORKSPACE/PersonalToolbox.ipa"
          ls -lh PersonalToolbox.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonalToolbox-ipa
          path: PersonalToolbox.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
          if-no-files-found: ignore

      # Publish errors to public branch (readable without PAT / log login).
      - name: Publish archive errors to ci-errors branch
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64, json, os, re, urllib.error, urllib.request

          log_path = os.path.join(os.environ["RUNNER_TEMP"], "xcodebuild-archive.log")
          greps = ""
          tail = ""
          if os.path.isfile(log_path):
              err = open(log_path, errors="replace").read()
              greps = "\n".join(re.findall(r".*(?:error:|fatal error).*", err)[-100:])
              tail = "\n".join(err.splitlines()[-150:])
          sha = os.environ["GITHUB_SHA"]
          short = sha[:7]
          run = os.environ["GITHUB_RUN_ID"]
          repo = os.environ["GITHUB_REPOSITORY"]
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          content = f"""# Archive failed on `{short}`

          Run: {server}/{repo}/actions/runs/{run}
          Commit: `{sha}`

          ## Grep errors
          ```
          {greps or "(no grep hits)"}
          ```

          ## Tail
          ```
          {tail}
          ```
          """
          token = os.environ["GH_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "ci-log-bot",
              "Content-Type": "application/json",
          }

          def api(method, url, data=None):
              req = urllib.request.Request(url, data=data, method=method, headers=headers)
              try:
                  with urllib.request.urlopen(req) as resp:
                      body = resp.read()
                      return resp.status, json.loads(body) if body else {}
              except urllib.error.HTTPError as e:
                  body = e.read().decode(errors="replace")
                  print(method, url, e.code, body[:800])
                  raise

          # Ensure branch exists (from current SHA).
          ref_url = f"https://api.github.com/repos/{repo}/git/ref/heads/ci-errors"
          try:
              api("GET", ref_url)
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  raise
              api(
                  "POST",
                  f"https://api.github.com/repos/{repo}/git/refs",
                  json.dumps({"ref": "refs/heads/ci-errors", "sha": sha}).encode(),
              )

          path = "latest-archive-errors.md"
          file_url = f"https://api.github.com/repos/{repo}/contents/{path}?ref=ci-errors"
          sha_file = None
          try:
              st, existing = api("GET", file_url)
              sha_file = existing.get("sha")
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  raise

          payload = {
              "message": f"ci: archive errors {short}",
              "content": base64.b64encode(content.encode()).decode(),
              "branch": "ci-errors",
          }
          if sha_file:
              payload["sha"] = sha_file
          st, out = api(
              "PUT",
              f"https://api.github.com/repos/{repo}/contents/{path}",
              json.dumps(payload).encode(),
          )
          print("published", out.get("content", {}).get("html_url") or out)
          PY
