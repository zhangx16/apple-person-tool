name: Build Ad Hoc IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "DESIGN*"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Archive & export IPA
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          openssl version

      - name: Build signing keychain from PEM secrets
        env:
          SIGNING_CERT_PEM: ${{ secrets.SIGNING_CERT_PEM }}
          SIGNING_KEY_PEM: ${{ secrets.SIGNING_KEY_PEM }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNING_CERT_PEM:-}" ] || [ -z "${SIGNING_KEY_PEM:-}" ]; then
            echo "::error::Missing SIGNING_CERT_PEM or SIGNING_KEY_PEM"
            exit 1
          fi
          if [ -z "${BUILD_PROVISION_PROFILE_BASE64:-}" ]; then
            echo "::error::Missing BUILD_PROVISION_PROFILE_BASE64"
            exit 1
          fi

          CERT_PEM="$RUNNER_TEMP/cert.pem"
          KEY_PEM="$RUNNER_TEMP/key.pem"
          P12_PATH="$RUNNER_TEMP/dist.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s\n' "$SIGNING_CERT_PEM" > "$CERT_PEM"
          printf '%s\n' "$SIGNING_KEY_PEM" > "$KEY_PEM"
          # normalize PEM newlines if secret was stored with escaped content
          if ! grep -q "BEGIN CERTIFICATE" "$CERT_PEM"; then
            echo "::error::SIGNING_CERT_PEM does not look like a PEM certificate"
            exit 1
          fi
          if ! grep -q "BEGIN" "$KEY_PEM"; then
            echo "::error::SIGNING_KEY_PEM does not look like a PEM private key"
            exit 1
          fi

          # Create PKCS12 with algorithms macOS security accepts
          openssl pkcs12 -export \
            -inkey "$KEY_PEM" \
            -in "$CERT_PEM" \
            -out "$P12_PATH" \
            -passout "pass:${P12_PASSWORD}" \
            -name "iPhone Distribution" \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg sha1

          echo "P12 size=$(wc -c < "$P12_PATH")"
          openssl pkcs12 -in "$P12_PATH" -passin "pass:${P12_PASSWORD}" -noout
          echo "P12 self-check OK"

          # Decode provisioning profile (macOS base64 is picky; use Python)
          export PP_PATH
          python3 -c 'import base64,os,pathlib; raw=os.environ["BUILD_PROVISION_PROFILE_BASE64"].strip().replace("\n","").replace(" ",""); data=base64.b64decode(raw); p=pathlib.Path(os.environ["PP_PATH"]); p.write_bytes(data); print("Profile decoded bytes=",len(data)); assert len(data)>=1000, "profile too small"'
          echo "Profile size=$(wc -c < "$PP_PATH")"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          echo "Installed profile UUID=${PROFILE_UUID}"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "iPhone Distribution"
          echo "Codesigning identity ready"

      - name: Resolve schemes
        run: xcodebuild -project PersonalToolbox.xcodeproj -list

      - name: Archive
        run: |
          set -euo pipefail
          set -o pipefail
          set +e
          xcodebuild \
            -project PersonalToolbox.xcodeproj \
            -scheme PersonalToolbox \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/PersonalToolbox.xcarchive" \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=CTSQLK944L \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER=app.parsnip6345.lake8262 \
            PROVISIONING_PROFILE_SPECIFIER="00008150-001A088E148B401C6F01CD" \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-archive.log"
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$STATUS" -ne 0 ]; then
            {
              echo "### ❌ Archive failed"
              echo
              echo "#### Grep errors"
              echo '```'
              grep -E 'error:|fatal error' "$RUNNER_TEMP/xcodebuild-archive.log" | tail -n 100 || echo "(no grep hits)"
              echo '```'
              echo
              echo "#### Tail (200 lines)"
              echo '```'
              tail -n 200 "$RUNNER_TEMP/xcodebuild-archive.log" || true
              echo '```'
            } | tee -a "$GITHUB_STEP_SUMMARY"
            echo "::group::Swift / xcodebuild errors"
            grep -E 'error:|warning:.*error|❌|fatal error' "$RUNNER_TEMP/xcodebuild-archive.log" | tail -n 80 || true
            echo "::endgroup::"
            exit "$STATUS"
          fi

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/PersonalToolbox.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            | tee "$RUNNER_TEMP/xcodebuild-export.log"
          ls -la "$RUNNER_TEMP/export"
          test -f "$RUNNER_TEMP/export/PersonalToolbox.ipa"
          cp "$RUNNER_TEMP/export/PersonalToolbox.ipa" "$GITHUB_WORKSPACE/PersonalToolbox.ipa"
          ls -lh PersonalToolbox.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonalToolbox-ipa
          path: PersonalToolbox.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
          if-no-files-found: ignore

      # GITHUB_TOKEN can push logs to a branch so we can read them without a PAT.
      - name: Publish build log to ci-logs branch
        if: failure()
        run: |
          set -euo pipefail
          LOG="$RUNNER_TEMP/xcodebuild-archive.log"
          if [ ! -f "$LOG" ]; then
            echo "No archive log present"
            exit 0
          fi
          WORK=/tmp/ci-logs-publish
          rm -rf "$WORK"
          git clone --depth 1 --branch main "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$WORK"
          cd "$WORK"
          mkdir -p ci-logs
          {
            echo "# Archive failure log"
            echo
            echo "- run: ${GITHUB_RUN_ID}"
            echo "- sha: ${GITHUB_SHA}"
            echo "- time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo '## Grep errors'
            echo '```'
            grep -E 'error:|fatal error|❌' "$LOG" | tail -n 100 || true
            echo '```'
            echo
            echo '## Tail'
            echo '```'
            tail -n 200 "$LOG" || true
            echo '```'
          } > ci-logs/latest-archive-failure.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-logs/latest-archive-failure.md
          git commit -m "ci: archive failure log for ${GITHUB_SHA:0:7}" || exit 0
          git push origin HEAD:main
