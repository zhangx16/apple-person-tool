name: Build Ad Hoc IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "DESIGN*"

permissions:
  contents: read

jobs:
  build:
    name: Archive & export IPA
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${BUILD_PROVISION_PROFILE_BASE64:-}" ]; then
            echo "::error::Missing BUILD_PROVISION_PROFILE_BASE64 secret"
            exit 1
          fi
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          # fallback for older base64
          if [ ! -s "$PP_PATH" ]; then
            echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 -D > "$PP_PATH"
          fi
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          echo "Installed provisioning profile UUID=${PROFILE_UUID} size=$(wc -c < "$PP_PATH")"
          security find-identity -v -p codesigning
          security find-identity -v -p codesigning | grep -q "iPhone Distribution"

      - name: Resolve package / list schemes
        run: |
          xcodebuild -project PersonalToolbox.xcodeproj -list

      - name: Archive
        run: |
          set -euo pipefail
          set -o pipefail
          xcodebuild \
            -project PersonalToolbox.xcodeproj \
            -scheme PersonalToolbox \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/PersonalToolbox.xcarchive" \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=CTSQLK944L \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER=app.parsnip6345.lake8262 \
            PROVISIONING_PROFILE_SPECIFIER="00008150-001A088E148B401C6F01CD" \
            | tee "$RUNNER_TEMP/xcodebuild-archive.log"

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/PersonalToolbox.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            | tee "$RUNNER_TEMP/xcodebuild-export.log"
          ls -la "$RUNNER_TEMP/export"
          test -f "$RUNNER_TEMP/export/PersonalToolbox.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonalToolbox-ipa
          path: ${{ runner.temp }}/export/PersonalToolbox.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
          if-no-files-found: ignore
